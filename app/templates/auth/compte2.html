<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Création de Compte - RyvixLab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/compte2.css') }}">
    <style>
        .flash-container {
            margin: 10px auto;
            max-width: 400px;
        }
        .flash {
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 14px;
            text-align: center;
        }
        .flash-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .flash-danger  { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .flash-warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .flash-info    { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <div>
        <div class="sp"><span class="sp1">Ryvix</span><span class="sp2">Lab</span></div>
        
        {% include '_flash_messages.html' %}
        
        <div class="container">
            <form method="POST" action="{{ url_for('auth.register') }}" autoComplete="off" >
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="textconect">Créer un compte</div>
                
                <div>
                    <input
                        id="inp-utilisateur"
                        name="username"
                        class="inp"
                        type="text"
                        placeholder="Utilisateur"
                        value="{{ username or '' }}"
                        required
                        minlength="3"
                        autofocus
                    >
                </div>
                
                <div>
                    <input
                        id="inp-Email"
                        name="email"
                        class="inp"
                        type="email"
                        placeholder="Email"
                        value="{{ email or '' }}"
                        required
                    >
                </div>
                
                <div>
                    <input
                        id="inp-motdepasse"
                        name="password"
                        class="inp"
                        type="password"
                        placeholder="Mot de passe (min. 6 caractères)"
                        required
                        minlength="6"
                    >
                </div>
                
                <div>
                    <input
                        id="inp-confirmation"
                        name="confirmation"
                        class="inp"
                        type="password"
                        placeholder="Confirmation du mot de passe"
                        required
                        minlength="6"
                    >
                </div>
                
                <select class="inp" id="choix" name="role" required>
                    <option value="standard" {% if role == 'standard' %}selected{% endif %}>
                        Standard
                    </option>
                    <option value="administrateur" {% if role == 'administrateur' %}selected{% endif %}>
                        Administrateur
                    </option>
                </select>
                
                <button id="btn-creationdecompte" class="btnconect" type="submit">
                    Créer
                </button>
            </form>
            
            <a href="{{ url_for('main.acceuil') }}">
                <div id="btn-conection" class="nouveaucompte">
                    <span class="nouveau">← Retour à l'accueil</span>
                </div>
            </a>
            
            <div class="dvtextanba">
                Ce formulaire est réservé aux administrateurs.
            </div>
        </div>
    </div>
</body>
</html>
